<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f0e8;

  --black: #1a1a1a;
  --gray: #7a7a7a;
  --line: #d8d0c4;

body {
  font-family: 'Noto Sans KR', sans-serif;

  align-items: center;
  justify-content: center;
  padding: 24px 20px;
}
.container { width: 100%; max-width: 420px; }

.progress-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.progress-label { font-weight: 300; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); }
.progress-num { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 13px; color: var(--black); }
.progress-bar { width: 100%; height: 1px; background: var(--line); }
.progress-fill { height: 100%; background: var(--black); transition: width 0.6s cubic-bezier(.4,0,.2,1); }

.card, .result-card, .title-card { background: var(--card); border: 1px solid var(--line); animation: fadeUp 0.5s cubic-bezier(.4,0,.2,1); }

.title-top { padding: 40px 32px 32px; border-bottom: 1px solid var(--line); text-align: center; }
.title-illust { width: 100%; max-width: 300px; margin: 0 auto 28px; display: block; }
.title-eyebrow { font-weight: 300; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gray); margin-bottom: 10px; }
.title-h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; color: var(--black); line-height: 1.25; margin-bottom: 12px; }
.title-sub { font-weight: 300; font-size: 12px; color: var(--gray); line-height: 1.8; }
.title-body { padding: 24px 32px; }
.start-btn { width: 100%; padding: 16px; background: var(--black); color: var(--bg); border: none; font-family: 'Noto Sans KR', sans-serif; font-weight: 300; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }
.start-btn:hover { opacity: 0.75; }

.card { overflow: hidden; }
.q-illust-wrap { padding: 40px 32px 28px; border-bottom: 1px solid var(--line); display: flex; flex-direction: column; align-items: center; min-height: 260px; justify-content: center; position: relative; }
.q-num { font-family: 'Playfair Display', serif; font-size: 80px; font-weight: 900; color: var(--black); line-height: 1; opacity: 0.06; position: absolute; top: 16px; left: 24px; }
.q-svg { width: 120px; height: 140px; margin-bottom: 20px; }
.q-text { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; color: var(--black); text-align: center; line-height: 1.5; }
.opts-wrap { padding: 0; }
.opt-btn { width: 100%; padding: 18px 32px; background: transparent; border: none; border-bottom: 1px solid var(--line); font-family: 'Noto Sans KR', sans-serif; font-weight: 300; font-size: 13px; color: var(--black); text-align: left; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: background 0.15s; letter-spacing: 0.2px; }
.opt-btn:last-child { border-bottom: none; }
.opt-btn:hover { background: var(--bg); }
.opt-arrow { font-size: 16px; color: var(--gray); transition: transform 0.2s; }
.opt-btn:hover .opt-arrow { transform: translateX(4px); }

.result-card { overflow: hidden; }
.result-top { padding: 40px 32px 28px; border-bottom: 1px solid var(--line); text-align: center; }
.result-svg { width: 120px; height: 150px; margin: 0 auto 24px; display: block; }
.result-eyebrow { font-weight: 300; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gray); margin-bottom: 8px; }
.result-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--black); line-height: 1.3; margin-bottom: 12px; }
.result-desc { font-weight: 300; font-size: 12px; color: var(--gray); line-height: 1.9; }
.result-body { padding: 0; }
.feat-item { display: flex; align-items: center; gap: 14px; padding: 16px 32px; border-bottom: 1px solid var(--line); font-weight: 300; font-size: 12px; color: var(--black); }
.feat-item:last-child { border-bottom: none; }
.feat-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--black); flex-shrink: 0; }
.restart-btn { width: 100%; padding: 18px 32px; background: var(--black); color: var(--bg); border: none; font-family: 'Noto Sans KR', sans-serif; font-weight: 300; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; display: block; }
.restart-btn:hover { opacity: 0.75; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

let answers={}, current=0;
function pad(n){ return n<10?'0'+n:n; }

function showTitle(){
  document.getElementById('progressWrap').style.opacity='0';
  document.getElementById('quizArea').innerHTML=`
    <div class="title-card">
      <div class="title-top">
        <svg class="title-illust" viewBox="0 0 300 160" fill="none" xmlns="http://www.w3.org/2000/svg">
          ${titleSVGContent}
        </svg>
        <div class="title-eyebrow">Tumbler Guide</div>
        <div class="title-h1">나에게 맞는<br>텀블러는?</div>
        <div class="title-sub">6가지 질문으로 찾아보는<br>내 생활습관 맞춤 텀블러</div>
      </div>
      <div class="title-body">
        <button class="start-btn" onclick="startQuiz()">시작하기 →</button>
      </div>
    </div>`;
}

function startQuiz(){
  document.getElementById('progressWrap').style.opacity='1';
  renderQ(0);
}

function renderQ(idx){
  const q=questions[idx];
  const pct=Math.round((idx/questions.length)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressNum').textContent=`${pad(idx+1)} / ${pad(questions.length)}`;
  document.getElementById('quizArea').innerHTML=`
    <div class="card">
      <div class="q-illust-wrap">
        <div class="q-num">${pad(idx+1)}</div>
        <svg class="q-svg" viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
          ${qSVGs[q.svgKey].replace(/<svg[^>]*>|<\/svg>/g,'')}
        </svg>
        <div class="q-text">${q.q.replace(/\n/g,'<br>')}</div>
      </div>
      <div class="opts-wrap">
        ${q.opts.map(o=>`<button class="opt-btn" onclick="answer('${o.val}')"><span>${o.text}</span><span class="opt-arrow">→</span></button>`).join('')}
      </div>
    </div>`;
}

function answer(val){
  answers[val]=true; current++;
  if(current<questions.length) renderQ(current);
  else showResult();
}

function showResult(){
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('progressNum').textContent=`${pad(questions.length)} / ${pad(questions.length)}`;
  const r=profiles.find(p=>p.cond(answers));
  document.getElementById('quizArea').innerHTML=`
    <div class="result-card">
      <div class="result-top">
        <svg class="result-svg" viewBox="0 0 120 150" fill="none" xmlns="http://www.w3.org/2000/svg">
          ${resultSVGs[r.svg].replace(/<svg[^>]*>|<\/svg>/g,'')}
        </svg>
        <div class="result-eyebrow">${r.badge}</div>
        <div class="result-title">${r.title.replace(/\n/g,'<br>')}</div>
        <div class="result-desc">${r.desc}</div>
      </div>
      <div class="result-body">
        ${r.feats.map(f=>`<div class="feat-item"><span class="feat-dot"></span><span>${f}</span></div>`).join('')}
        <button class="restart-btn" onclick="restart()">다시 해보기 ↺</button>
      </div>
    </div>`;
}

function restart(){ answers={}; current=0; showTitle(); }
showTitle();
